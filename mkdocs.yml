edit_uri: edit/main/docs/

site_name: Xeno Bot Docs
site_description: Documentation for Xeno Bot
theme:
  name: material
  custom_dir: overrides
  features:
    - content.action.edit
    - content.action.view
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/white-balance-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings
  - mermaid2
  - awesome-pages
  - redirects
  - minify:
      minify_html: true
  - git-authors
  - include-markdown
  - macros
  - i18n:
      languages:

        # Navigation is generated automatically from `docs/` directory structure.
        # Remove this `nav:` section to let MkDocs generate the sidebar from files
        # so adding/removing files updates the sidebar automatically.
  - codehilite:
      guess_lang: false
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.betterem
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.caret
  - pymdownx.keys

extra_css:
  - css/extra.css
